<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개와 늑대의 시간 - Archive</title>
    <style>
        :root {
            --white: #ffffff;
            --pink: #ffafbd;
            --blue: #a2d2ff;
            --soft-blue: #f0f7ff;
            --text-main: #555555;
            --transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--white); 
            color: var(--text-main); 
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        #intro-screen {
            position: fixed; inset: 0; background: var(--white);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer; transition: opacity 0.6s ease;
        }
        #intro-screen h1 { 
            font-size: 1.8rem; font-weight: 300; letter-spacing: 10px; color: var(--blue);
            margin-bottom: 20px;
        }
        .click-text { font-size: 0.75rem; color: var(--pink); letter-spacing: 4px; font-weight: 700; }

        #main-ui {
            display: none; opacity: 0; width: 100%; min-height: 100vh;
        }
        nav {
            position: fixed; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: center; align-items: center;
            gap: 80px; z-index: 100; border-bottom: 1px solid var(--soft-blue);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
        }
        .nav-btn {
            background: none; border: none; cursor: pointer;
            font-size: 0.85rem; font-weight: 700; color: #ccc;
            letter-spacing: 2px; transition: var(--transition);
        }
        .nav-btn.active { color: var(--blue); }
        .nav-btn:hover { color: var(--pink); }

        section {
            display: none; width: 100%; padding-top: 100px; padding-bottom: 120px;
            animation: fadeIn 0.5s ease;
            flex-direction: column; align-items: center;
        }
        section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .profile-container { display: flex; gap: 30px; width: 90%; max-width: 950px; justify-content: center; }
        .char-card {
            flex: 1; display: flex; flex-direction: column;
            padding: 30px; background: var(--white); border-radius: 4px;
            border: 1px solid var(--soft-blue); text-align: center;
            transition: var(--transition);
        }
        .char-card:hover { border-color: var(--pink); transform: translateY(-5px); }
        .char-img { 
            width: 100%; aspect-ratio: 1; object-fit: cover; 
            background: var(--soft-blue); border-radius: 2px; margin-bottom: 25px; 
        }
        .char-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
        .darong .char-name { color: var(--pink); }
        .sihyun .char-name { color: var(--blue); }
        .char-tag { font-size: 0.8rem; color: #bbb; margin-bottom: 20px; font-weight: 600; }
        .char-quote { 
            font-size: 0.85rem; line-height: 1.8; color: var(--text-main);
            padding: 20px; background: var(--soft-blue); border-radius: 4px;
        }

        .gallery-info { margin-bottom: 30px; text-align: center; width: 100%; }
        .gallery-info p { font-size: 0.85rem; color: #999; }

        .gallery-grid {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 90%; 
            max-width: 900px;
        }
        .grid-item {
            aspect-ratio: 1; background: var(--soft-blue); cursor: pointer;
            overflow: hidden; border-radius: 4px; transition: var(--transition);
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: 0.4s; }
        .grid-item:hover img { transform: scale(1.05); opacity: 1; }

        #modal {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98);
            display: none; z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        #modal img { max-width: 85%; max-height: 75vh; border-radius: 4px; border: 1px solid var(--soft-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #modal p { margin-top: 25px; font-size: 0.95rem; color: var(--text-main); font-weight: 400; text-align: center; width: 80%; line-height: 1.6; }
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 2.5rem; cursor: pointer; color: var(--blue); line-height: 1; }

        .cta-box { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: center; z-index: 90; }
        .btn-entry {
            background: var(--blue); color: var(--white); border: none;
            padding: 14px 70px; font-size: 0.9rem; font-weight: 700;
            letter-spacing: 3px; cursor: pointer; transition: var(--transition);
            border-radius: 2px; box-shadow: 0 4px 15px rgba(162, 210, 255, 0.4);
        }
        .btn-entry:hover { background: var(--pink); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255, 175, 189, 0.4); }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .profile-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="intro-screen" onclick="startApp()">
        <h1>개와 늑대의 시간</h1>
        <p class="click-text">CLICK</p>
    </div>

    <div id="main-ui">
        <nav>
            <button class="nav-btn active" onclick="tabChange(event, 'p1')">PROFILE</button>
            <button class="nav-btn" onclick="tabChange(event, 'p2')">SPIN-OFF</button>
        </nav>

        <section id="p1" class="active">
            <div class="profile-container">
                <div class="char-card darong">
                    <img src="https://igx.kr/r/zt/1/19" class="char-img">
                    <span class="char-tag">심리학과 | 여우 수인 | 소꿉친구</span>
                    <h2 class="char-name">정다롱</h2>
                    <p class="char-quote">"오늘도 너를 좋아해!"</p>
                </div>
                <div class="char-card sihyun">
                    <img src="https://igx.kr/r/zt/1/20" class="char-img">
                    <span class="char-tag">회화과 | 늑대 수인 | 개인주의</span>
                    <h2 class="char-name">권시현</h2>
                    <p class="char-quote">"관계에 이름 붙이는 거, 하지말자."</p>
                </div>
            </div>
        </section>

        <section id="p2">
            <div class="gallery-info">
                <p>본 편에 수록되지 않은 스핀오프 이미지들입니다.</p>
            </div>
            <div class="gallery-grid">
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/0', '네, 원래는 더 캐주얼합니다.')"><img src="https://igx.kr/r/zt/1/0"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/4', '두 사람이 밴드가 된 세계선도 있을겁니다. 참고로 정다롱은 음치입니다.')"><img src="https://igx.kr/r/zt/1/4"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/18', '바닷가에도 갈 수 있겠죠. 권시현은 개헤엄을 칩니다.')"><img src="https://igx.kr/r/zt/1/18"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/15', '피곤한 학교 생활이 됐을겁니다.')"><img src="https://igx.kr/r/zt/1/15"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/16', '제가 양 수인이었다면요.')"><img src="https://igx.kr/r/zt/1/16"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/14', '그녀가 종종 하울링을 한다는 소문은, 소문입니다.')"><img src="https://igx.kr/r/zt/1/14"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/13', '시내에 나간다고 빨간 자켓을 꺼냈군요.')"><img src="https://igx.kr/r/zt/1/13"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/11', '오늘의 추천메뉴는 ...')"><img src="https://igx.kr/r/zt/1/11"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/10', '신도시에서는, 신도시의 법을 따라야겠죠.')"><img src="https://igx.kr/r/zt/1/10"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/17', '잡아 먹지는 않습니다.')"><img src="https://igx.kr/r/zt/1/17"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/12', '내 걸 건드리면 잡아 먹습니다.')"><img src="https://igx.kr/r/zt/1/12"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/9', '대부분의 수인은 어린시절 따돌림을 당합니다. 하지만 다롱은 외로운 적이 없었습니다.')"><img src="https://igx.kr/r/zt/1/9"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/8', '늑대와 고양이의 시간.')"><img src="https://igx.kr/r/zt/1/8"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/7', '네, 그녀는 사실...')"><img src="https://igx.kr/r/zt/1/7"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/6', '이름도 정해지지 않았습니다.')"><img src="https://igx.kr/r/zt/1/6"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/3', '어울리긴 하지만, 실제로는 글쎄요.')"><img src="https://igx.kr/r/zt/1/3"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/5', '저희 사이 좋아요~')"><img src="https://igx.kr/r/zt/1/5"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/2', '부거...부거를 주십시오.')"><img src="https://igx.kr/r/zt/1/2"></div>
                <div class="grid-item" onclick="inspectImg('https://igx.kr/r/zt/1/1', '그녀의 꼬리는 1개가 맞습니다.')"><img src="https://igx.kr/r/zt/1/1"></div>
            </div>
        </section>

        <div class="cta-box">
            <button class="btn-entry" onclick="location.href='https://share.crack.wrtn.ai/qxwjls'">CAMPUS LOG-IN</button>
        </div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <span class="close-btn">&times;</span>
        <img id="m-img" src="">
        <p id="m-txt"></p>
    </div>

    <script>
        function startApp() {
            const intro = document.getElementById('intro-screen');
            const main = document.getElementById('main-ui');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                main.style.display = 'block';
                setTimeout(() => main.style.opacity = '1', 50);
            }, 600);
        }

        function tabChange(e, id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
            window.scrollTo(0, 0);
        }

        function inspectImg(src, txt) {
            document.getElementById('m-img').src = src;
            document.getElementById('m-txt').innerText = txt;
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
